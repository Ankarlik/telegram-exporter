name: Build release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-12
            dmg: TelegramExporter-mac-intel.dmg
          - os: macos-14
            dmg: TelegramExporter-mac-arm64.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build DMG
        env:
          DMG_NAME: ${{ matrix.dmg }}
        run: chmod +x ./scripts/build_mac.sh && ./scripts/build_mac.sh
      - name: Publish to Downloads Repo
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.DOWNLOADS_TOKEN }}
          repository: morf3uzzz/telegram-exporter-downloads
          target_commitish: main
          files: dist/${{ matrix.dmg }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build EXE
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_win_installer.ps1
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: iscc .\installer\TelegramExporter.iss
      - name: Publish to Downloads Repo
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.DOWNLOADS_TOKEN }}
          repository: morf3uzzz/telegram-exporter-downloads
          target_commitish: main
          files: dist/TelegramExporterSetup.exe
